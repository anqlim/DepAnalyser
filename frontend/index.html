<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepAnalyser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000d1a;
            --border: #083550;
            --text: #3a6a85;
            --text-bright: #7aaccc;
            --cycle: #BA0D18;
            --redundant: #4d8fa8;
            --normal: #0d3d58;
            --node-fill: #1a4a66;
            --node-stroke: #2a6080;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        header h1 {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text);
        }

        .legend {
            display: none;
            gap: 24px;
            align-items: center;
            padding: 8px 28px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .legend.visible { display: flex; }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            color: var(--text);
            letter-spacing: 0.05em;
        }

        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
        .legend-line { width: 20px; height: 1px; }
        .legend-dash {
            width: 20px; height: 1px;
            background: repeating-linear-gradient(90deg, var(--redundant) 0, var(--redundant) 4px, transparent 4px, transparent 7px);
        }

        #status {
            font-size: 11px;
            color: var(--text);
            padding: 5px 28px;
            flex-shrink: 0;
            min-height: 22px;
            letter-spacing: 0.04em;
        }

        #status.error { color: var(--cycle); }

        #graph {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg);
        }

        svg { width: 100%; height: 100%; }

        .node circle { stroke-width: 1.5; cursor: pointer; transition: opacity 0.15s; }
        .node text {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 300;
            fill: var(--text);
            pointer-events: none;
            user-select: none;
        }
        .node:hover circle { opacity: 0.75; }
        .link { fill: none; stroke-opacity: 0.6; stroke-width: 1; }
        .link.redundant { stroke-dasharray: 4 3; stroke-opacity: 0.5; }

        .landing {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 48px;
        }

        .landing-title {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 46px;
            color: var(--border);
            letter-spacing: 0.02em;
            user-select: none;
        }

        .landing-actions {
            display: flex;
            gap: 56px;
            align-items: flex-start;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            transition: opacity 0.2s;
        }

        .action-btn:hover { opacity: 0.7; }

        .action-icon {
            width: 52px;
            height: 52px;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-icon svg { width: 22px; height: 22px; stroke: var(--text); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        .action-label {
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text);
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 420px;
        }

        .zip-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        /* zip archive icon in the preview area */
        .zip-preview svg { width: 18px; height: 18px; stroke: var(--text); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

        .zip-name {
            font-size: 13px;
            color: var(--text-bright);
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .url-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-bright);
            padding: 6px 0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 300;
            outline: none;
            transition: border-color 0.2s;
            letter-spacing: 0.02em;
        }

        .url-input:focus { border-bottom-color: var(--text); }
        .url-input::placeholder { color: var(--border); }

        .analyse-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 7px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
            border-radius: 8px; /* rounded to match action-icon */
        }

        .analyse-btn:hover { border-color: var(--text); color: var(--text-bright); }
        .analyse-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #file-input { display: none; }
    </style>
</head>
<body>

<header>
    <h1>DepAnalyser</h1>
</header>

<div class="legend" id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1a4a66;border:1px solid #2a6080"></div> file</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6E0000;border:1px solid #BA0D18"></div> cycle</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b8c8d4;border:1px solid #d0dde5"></div> critical</div>
    <div class="legend-item"><div class="legend-line" style="background:#0d3d58"></div> dependency</div>
    <div class="legend-item"><div class="legend-dash"></div> redundant</div>
</div>

<div id="status"></div>

<div id="graph">
    <div class="landing" id="landing">
        <span class="landing-title">map your dependencies</span>

        <div class="landing-actions" id="landing-actions">
            <!-- Upload ZIP button: upload arrow icon -->
            <button class="action-btn" onclick="document.getElementById('file-input').click()">
                <div class="action-icon">
                    <svg viewBox="0 0 24 24"><polyline points="16 9 12 5 8 9"/><line x1="12" y1="5" x2="12" y2="16"/><path d="M4 17v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1"/></svg>
                </div>
                <span class="action-label">Upload ZIP</span>
            </button>

            <button class="action-btn" onclick="showGitHub()">
                <div class="action-icon">
                    <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                </div>
                <span class="action-label">GitHub</span>
            </button>
        </div>

        <div class="input-area" id="zip-area" style="display:none">
            <div class="zip-preview">
                <!-- ZIP archive icon: folder with zipper / compressed file -->
                <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><polyline points="13 2 13 9 17 9 11 15 11 22"/></svg>
                <span class="zip-name" id="zip-name"></span>
            </div>
            <button class="analyse-btn" id="zip-analyse-btn" onclick="runZipAnalysis()">Analyse</button>
        </div>

        <div class="input-area" id="github-area" style="display:none">
            <input class="url-input" id="github-url" placeholder="https://github.com/user/repo" />
            <button class="analyse-btn" id="github-analyse-btn" onclick="runGitHubAnalysis()">Analyse</button>
        </div>
    </div>
</div>

<input type="file" id="file-input" accept=".zip" onchange="onFileSelected(event)" />

<script>
    let simulation = null;
    let selectedFile = null;

    function setStatus(msg, isError = false) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = isError ? 'error' : '';
    }

    function showGitHub() {
        document.getElementById('zip-area').style.display = 'none';
        document.getElementById('github-area').style.display = 'flex';
        document.getElementById('github-url').focus();
    }

    function onFileSelected(e) {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        document.getElementById('zip-name').textContent = file.name;
        document.getElementById('github-area').style.display = 'none';
        document.getElementById('zip-area').style.display = 'flex';
    }

    document.getElementById('github-url').addEventListener('keydown', e => {
        if (e.key === 'Enter') runGitHubAnalysis();
    });

    async function runGitHubAnalysis() {
        const url = document.getElementById('github-url').value.trim();
        if (!url) return;

        const btn = document.getElementById('github-analyse-btn');
        btn.disabled = true;
        setStatus('cloning repository...');

        try {
            const res = await fetch('/analyse-repo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            await handleResponse(res);
        } catch (e) {
            setStatus('connection error', true);
        } finally {
            btn.disabled = false;
        }
    }

    async function runZipAnalysis() {
        if (!selectedFile) return;

        const btn = document.getElementById('zip-analyse-btn');
        btn.disabled = true;
        setStatus('uploading...');

        try {
            const form = new FormData();
            form.append('file', selectedFile);

            const res = await fetch('/upload', { method: 'POST', body: form });
            await handleResponse(res);
        } catch (e) {
            setStatus('connection error', true);
        } finally {
            btn.disabled = false;
        }
    }

    async function handleResponse(res) {
        const text = await res.text();
        if (!res.ok) {
            setStatus(text, true);
            return;
        }
        const data = JSON.parse(text);
        setStatus(`${data.edges.length} edges · ${data.cycles.length} cycles · ${data.critical.length} critical · ${data.redundancy.length} redundant`);
        document.getElementById('legend').classList.add('visible');
        document.getElementById('landing').style.display = 'none';
        renderGraph(data);
    }

    function renderGraph(data) {
        d3.select('#graph svg').remove();

        const cycleIds = new Set(data.cycles.flat().map(v => v.id));
        const criticalIds = new Set(data.critical.map(v => v.id));
        const redundantKeys = new Set(data.redundancy.map(e => e.from_id + '→' + e.to_id));

        const nodeMap = new Map();
        data.edges.forEach(e => {
            if (!nodeMap.has(e.from_id)) nodeMap.set(e.from_id, { id: e.from_id, label: e.from_label });
            if (!nodeMap.has(e.to_id))   nodeMap.set(e.to_id,   { id: e.to_id,   label: e.to_label });
        });
        data.critical.forEach(v => {
            if (!nodeMap.has(v.id)) nodeMap.set(v.id, { id: v.id, label: v.label });
        });
        if (data.isolated) {
            data.isolated.forEach(v => {
                if (!nodeMap.has(v.id)) nodeMap.set(v.id, { id: v.id, label: v.label });
            });
        }

        const nodes = Array.from(nodeMap.values());
        const links = data.edges.map(e => ({
            source: e.from_id,
            target: e.to_id,
            redundant: redundantKeys.has(e.from_id + '→' + e.to_id),
            isCycle: cycleIds.has(e.from_id) && cycleIds.has(e.to_id)
        }));

        const container = document.getElementById('graph');
        const W = container.clientWidth;
        const H = container.clientHeight;
        const nodeCount = nodes.length;
        const linkDistance = nodeCount > 80 ? 60 : nodeCount > 30 ? 80 : 110;
        const chargeStrength = nodeCount > 80 ? -120 : nodeCount > 30 ? -180 : -260;

        const svg = d3.select('#graph').append('svg');
        const defs = svg.append('defs');

        defs.append('marker').attr('id', 'arrow-normal')
            .attr('viewBox', '0 -4 8 8').attr('refX', 17).attr('refY', 0)
            .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto')
            .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill', '#0d3d58');

        defs.append('marker').attr('id', 'arrow-redundant')
            .attr('viewBox', '0 -4 8 8').attr('refX', 17).attr('refY', 0)
            .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto')
            .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill', '#4d8fa8');

        defs.append('marker').attr('id', 'arrow-cycle')
            .attr('viewBox', '0 -4 8 8').attr('refX', 17).attr('refY', 0)
            .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto')
            .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill', '#8B0000');

        const g = svg.append('g');
        svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform)));

        const link = g.selectAll('.link')
            .data(links).enter().append('line')
            .attr('class', d => 'link' + (d.redundant ? ' redundant' : ''))
            .attr('stroke', d => d.isCycle ? '#8B0000' : d.redundant ? '#4d8fa8' : '#0d3d58')
            .attr('stroke-opacity', d => d.isCycle ? 0.9 : 0.6)
            .attr('marker-end', d => d.isCycle ? 'url(#arrow-cycle)' : d.redundant ? 'url(#arrow-redundant)' : 'url(#arrow-normal)');

        const node = g.selectAll('.node')
            .data(nodes).enter().append('g').attr('class', 'node')
            .call(d3.drag()
                .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
                .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
            );

        node.append('circle').attr('r', 6)
            .attr('fill', d => cycleIds.has(d.id) ? '#6E0000' : criticalIds.has(d.id) ? '#b8c8d4' : '#1a4a66')
            .attr('stroke', d => cycleIds.has(d.id) ? '#BA0D18' : criticalIds.has(d.id) ? '#d0dde5' : '#2a6080')
            .attr('stroke-width', d => criticalIds.has(d.id) ? 2 : 1.5);

        node.append('text').attr('x', 9).attr('y', 4).text(d => d.label);

        const boundPad = 40;
        simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(linkDistance))
            .force('charge', d3.forceManyBody().strength(chargeStrength))
            .force('center', d3.forceCenter(W / 2, H / 2))
            .force('bound', () => {
                nodes.forEach(d => {
                    d.x = Math.max(boundPad, Math.min(W - boundPad, d.x));
                    d.y = Math.max(boundPad, Math.min(H - boundPad, d.y));
                });
            })
            .on('tick', () => {
                link
                    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
    }
</script>
</body>
</html>
